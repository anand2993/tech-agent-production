apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tech-agent
  namespace: default
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: "tech-agent-ip"
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tech-agent
                port:
                  number: 80
