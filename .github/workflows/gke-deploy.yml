name: Deploy to GKE

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_CLUSTER: ${{ secrets.GKE_CLUSTER_NAME }}
  GKE_ZONE: ${{ secrets.GKE_CLUSTER_ZONE }}          # e.g. australia-southeast1-a
  REGION: ${{ secrets.GCP_REGION }}                  # e.g. australia-southeast1
  AR_REPO: tech-agent                                 # Artifact Registry repo name
  IMAGE: tech-agent
  NAMESPACE: default

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # 1. Run tests first (reuse existing CI job)
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -q

  # ────────────────────────────────────────────────────────────────────────────
  # 2. Build, push, and deploy to GKE Standard cluster
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Build & Deploy to GKE
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write        # required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      # ── Auth to GCP via Workload Identity Federation ───────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # ── Configure Docker to push to Artifact Registry ─────────────────────
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # ── Set short SHA as image tag ─────────────────────────────────────────
      - name: Set image tag
        id: tag
        run: echo "TAG=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      # ── Build and push Docker image ────────────────────────────────────────
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE }}:${{ steps.tag.outputs.TAG }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE }}:${{ steps.tag.outputs.TAG }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE }}:latest

      # ── Get GKE credentials ────────────────────────────────────────────────
      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      # ── Substitute placeholders in manifests and apply ────────────────────
      - name: Deploy to GKE
        run: |
          # Replace image placeholder in deployment.yaml with the real image URI
          sed -i "s|REGION-docker.pkg.dev/PROJECT_ID/${{ env.AR_REPO }}/${{ env.IMAGE }}:IMAGE_TAG|${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE }}:${{ steps.tag.outputs.TAG }}|g" k8s/deployment.yaml

          # Apply all manifests
          kubectl apply -f k8s/serviceaccount.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml
          kubectl apply -f k8s/hpa.yaml

          # Wait for rollout to complete (timeout 5 min)
          kubectl rollout status deployment/tech-agent -n ${{ env.NAMESPACE }} --timeout=300s

      # ── Print public endpoint ──────────────────────────────────────────────
      - name: Print ingress IP
        run: |
          echo "Waiting for external IP..."
          for i in $(seq 1 12); do
            IP=$(kubectl get ingress tech-agent -n ${{ env.NAMESPACE }} \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null)
            if [ -n "$IP" ]; then
              echo "✅ App is live at: http://${IP}"
              break
            fi
            echo "  attempt $i/12 – not ready yet, waiting 10s..."
            sleep 10
          done
